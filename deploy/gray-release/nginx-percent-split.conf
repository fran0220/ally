# Nginx gray release template
# - legacy Next.js: 127.0.0.1:3000
# - rust Axum API: 127.0.0.1:3001

upstream waoowaoo_legacy_next {
  server 127.0.0.1:3000;
  keepalive 64;
}

upstream waoowaoo_rust_api {
  server 127.0.0.1:3001;
  keepalive 64;
}

split_clients "${remote_addr}${http_user_agent}" $waoowaoo_api_bucket {
  10%   rust;
  *     next;
}

map $http_x_waoowaoo_canary $waoowaoo_api_override {
  default "";
  rust rust;
  next next;
}

map $waoowaoo_api_override $waoowaoo_api_route {
  default $waoowaoo_api_bucket;
  rust rust;
  next next;
}

map $waoowaoo_api_route $waoowaoo_api_upstream {
  default http://waoowaoo_legacy_next;
  rust http://waoowaoo_rust_api;
  next http://waoowaoo_legacy_next;
}

server {
  listen 80;
  server_name _;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # API and media proxy are split by percentage.
  location /api/ {
    proxy_pass $waoowaoo_api_upstream;
  }

  location /m/ {
    proxy_pass $waoowaoo_api_upstream;
  }

  # Keep health checks pinned to Rust API during migration.
  location = /healthz {
    proxy_pass http://waoowaoo_rust_api/healthz;
  }

  # Frontend traffic remains on legacy Next.js by default.
  location / {
    proxy_pass http://waoowaoo_legacy_next;
  }
}
